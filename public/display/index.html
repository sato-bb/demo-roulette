<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roulette Display</title>
    <link rel="stylesheet" href="/display/style.css" />
  </head>
  <body>
    <main class="display" id="display">
      <div class="display-bg" aria-hidden="true"></div>
      <section class="slot-machine" aria-live="polite">
        <div class="display-title-board">
          <h1 class="display-title"></h1>
        </div>
        <div class="slot-frame">
          <div class="reels-area">
            <div class="reels" id="reels"></div>
            <div class="target-hints" id="targetHints"></div>
          </div>
        </div>
        <p class="display-description"></p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/bgm.js"></script>
    <script src="/display/display.js"></script>
  </body>
</html>
