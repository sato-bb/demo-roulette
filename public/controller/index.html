<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roulette Controller</title>
    <link rel="stylesheet" href="/controller/style.css" />
  </head>
  <body>
    <main class="controller" id="controller">
      <div class="controller-bg" aria-hidden="true"></div>

      <section class="controller-panel" aria-live="polite">
        <div class="controller-frame">
          <div class="controller-actions">
            <div class="stop-buttons" id="stopButtons"></div>
          </div>
        </div>

        <button class="button-reset" id="resetButton" type="button"></button>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/controller/controller.js"></script>
  </body>
</html>
